<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL TEST DEL TERROR DE IPTABLES</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #e94560;
            --correct: #2d6a4f;
            --wrong: #6a2d2d;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* Estilos de la imagen del Gato */
        .img-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .img-container img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
            object-fit: cover;
        }

        h1 { text-align: center; color: #fff; background: var(--accent); padding: 20px; border-radius: 10px; margin-top: 0; }
        
        .pregunta-card { background: var(--card); border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .opcion { display: block; background: #0f3460; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .opcion.disabled { pointer-events: none; opacity: 0.7; }
        .opcion:hover { background: #533483; transform: scale(1.01); }

        .feedback { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; line-height: 1.4; }
        .correcto { background: #1b4332; color: #81c784; border: 1px solid var(--correct); }
        .incorrecto { background: #431b1b; color: #e57373; border: 1px solid var(--wrong); }

        /* Estilos del Círculo de Resultado Final */
        #resultado-final { 
            display: none; 
            text-align: center; 
            padding: 40px; 
            background: var(--card); 
            border-radius: 15px; 
            margin-top: 30px; 
            border: 2px solid var(--accent);
        }
        .circle-wrap {
            margin: 20px auto;
            width: 150px;
            height: 150px;
            background: #fefefe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #1a1a2e;
            position: relative;
        }
        .circle-wrap.pass { border: 10px solid #81c784; box-shadow: 0 0 20px #81c784; color: #1b4332; }
        .circle-wrap.fail { border: 10px solid #e57373; box-shadow: 0 0 20px #e57373; color: #431b1b; }
        
        button { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff4d6d; }
    </style>
</head>
<body>

<div class="container">
    <div class="img-container">
        <img src="HACKCAT.jpg" alt="HACKCAT">
    </div>

    <h1>🔥 EL TEST DEL TERROR: IPTABLES 🔥</h1>
    
    <div id="quiz"></div>

    <div id="resultado-final">
        <h2>PUNTUACIÓN OBTENIDA</h2>
        <div id="circulo" class="circle-wrap">0/10</div>
        <p id="mensaje-final" style="font-size: 1.2em; font-weight: bold; margin-bottom: 20px;"></p>
        <button onclick="location.reload()">REINTENTAR TEST</button>
    </div>
</div>

<script>
    const preguntas = [
        { 
            q: "1. Queremos redirigir el tráfico que llega al puerto 21 hacia nuestro servidor FTP. ¿Cuál es correcta?", 
            opts: { A: "iptables -t nat -A PREROUTING -d 10.0.2.102 -p tcp --dport 21 -j DNAT --to-source 2.2.2.2", B: "iptables -t nat -A PREROUTING -d 10.0.2.102 -p tcp --dport 21 -j DNAT --to-destination 2.2.2.2", C: "iptables -A PREROUTING -d 10.0.2.102 -p tcp --dport 21 -j DNAT --to-destination 2.2.2.2" }, 
            ans: "B", 
            exp: "La trampa en A es --to-source (es para SNAT). En C falta '-t nat'." 
        },
        { 
            q: "2. Toca abrir el rango de datos para el modo Pasivo en la tabla NAT. Ojo al detalle:", 
            opts: { A: "iptables -t nat -A PREROUTING -d 10.0.2.102 -p udp --dport 40000:40100 -j DNAT --to-destination 2.2.2.2", B: "iptables -t nat -A PREROUTING -s 10.0.2.102 -p tcp --dport 40000:40100 -j DNAT --to-destination 2.2.2.2", C: "iptables -t nat -A PREROUTING -d 10.0.2.102 -p tcp --dport 40000:40100 -j DNAT --to-destination 2.2.2.2" }, 
            ans: "C", 
            exp: "En A el error es UDP. En B el error es usar -s (origen) en lugar de -d (destino)." 
        },
        { 
            q: "3. Tienes que configurar el SNAT para enmascarar la IP al salir por la interfaz eth2. ¿Cuál no fallará?", 
            opts: { A: "iptables -t nat -A POSTROUTING -o eth2 -s 10.0.2.0/24 -d 2.2.2.2 -j SNAT --to-source 2.2.2.3", B: "iptables -t nat -A PREROUTING -o eth2 -s 10.0.2.0/24 -d 2.2.2.2 -j SNAT --to-source 2.2.2.3", C: "iptables -t nat -A POSTROUTING -i eth2 -s 10.0.2.0/24 -d 2.2.2.2 -j SNAT --to-source 2.2.2.3" }, 
            ans: "A", 
            exp: "SNAT siempre va en POSTROUTING y usa interfaz de salida -o." 
        },
        { 
            q: "4. Permiso (ACCEPT) para tráfico de control (puerto 21) detectando conexión nueva:", 
            opts: { A: "iptables -t nat -A FORWARD -d 2.2.2.2 -p tcp --dport 21 -m conntrack --ctstate NEW -j ACCEPT", B: "iptables -A FORWARD -s 2.2.2.2 -p tcp --dport 21 -m conntrack --ctstate NEW -j ACCEPT", C: "iptables -A FORWARD -d 2.2.2.2 -p tcp --dport 21 -m conntrack --ctstate NEW -j ACCEPT" }, 
            ans: "C", 
            exp: "ACCEPT va en tabla filter (por defecto). En B se equivoca con -s (debe ser destino -d)." 
        },
        { 
            q: "5. Política por defecto en DROP para el tráfico que atraviesa el firewall:", 
            opts: { A: "iptables -P FORWARD DROP", B: "iptables -A FORWARD -j DROP", C: "iptables -p FORWARD DROP" }, 
            ans: "A", 
            exp: "Para políticas se usa -P (mayúscula). La -p es para protocolo." 
        },
        { 
            q: "6. Dejar pasar paquetes de conexiones establecidas o relacionadas:", 
            opts: { A: "iptables -A FORWARD -m conntrack --ctstate NEW,RELATED -j ACCEPT", B: "iptables -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT", C: "iptables -t nat -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT" }, 
            ans: "B", 
            exp: "Es vital usar ESTABLISHED. En C intenta usar la tabla nat." 
        },
        { 
            q: "7. Activar el enrutamiento en el kernel:", 
            opts: { A: "sysctl -w net.ipv4.ip_forward=0", B: "sysctl -r net.ipv4.ip_forward=1", C: "sysctl -w net.ipv4.ip_forward=1" }, 
            ans: "C", 
            exp: "El 1 activa, el parámetro es -w (write)." 
        },
        { 
            q: "8. Permiso en tabla FILTER para el rango de puertos del FTP Pasivo:", 
            opts: { A: "iptables -A FORWARD -d 10.0.2.102 -p tcp --dport 40000:40100 -j ACCEPT", B: "iptables -A FORWARD -d 2.2.2.2 -p tcp --dport 40000:40100 -j ACCEPT", C: "iptables -A FORWARD -d 2.2.2.2 -p tcp --sport 40000:40100 -j ACCEPT" }, 
            ans: "B", 
            exp: "En FORWARD el paquete ya tiene la IP privada tras el DNAT." 
        },
        { 
            q: "9. Permitir la entrada de datos mezclando Activo y Pasivo:", 
            opts: { A: "iptables -A FORWARD -d 2.2.2.2 -p tcp --dport 20 -j ACCEPT", B: "iptables -t nat -A FORWARD -d 2.2.2.2 -p tcp --dport 40000:40100 -j ACCEPT", C: "iptables -A FORWARD -d 2.2.2.2 -p tcp --dport 40000:40100 -m conntrack --ctstate NEW -j ACCEPT" }, 
            ans: "C", 
            exp: "El puerto 20 es para el modo Activo. Aquí usamos el rango alto para el Pasivo." 
        },
        { 
            q: "10. Bloquear conexión directa AL firewall sin afectar lo que lo atraviesa:", 
            opts: { A: "iptables -P FORWARD DROP", B: "iptables -P INPUT DROP", C: "iptables -P OUTPUT DROP" }, 
            ans: "B", 
            exp: "INPUT es el tráfico con destino al propio host. FORWARD es el que atraviesa." 
        }
    ];

    let aciertos = 0;
    let respondidas = 0;
    const quizContainer = document.getElementById('quiz');

    preguntas.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'pregunta-card';
        card.innerHTML = `<p><strong>${p.q}</strong></p>`;
        
        Object.keys(p.opts).forEach(letra => {
            const btn = document.createElement('div');
            btn.className = 'opcion';
            btn.innerText = letra + ") " + p.opts[letra];
            btn.onclick = function() {
                if(this.parentElement.dataset.contestada === "true") return;
                
                respondidas++;
                this.parentElement.dataset.contestada = "true";
                const feedback = document.getElementById('f' + i);
                feedback.style.display = 'block';

                if (letra === p.ans) {
                    aciertos++;
                    feedback.className = 'feedback correcto';
                    feedback.innerHTML = `✅ ¡ACERTASTE! <br> ${p.exp}`;
                } else {
                    feedback.className = 'feedback incorrecto';
                    feedback.innerHTML = `❌ FALLASTE (Era la ${p.ans}). <br> ${p.exp}`;
                }
                
                this.parentElement.querySelectorAll('.opcion').forEach(o => o.classList.add('disabled'));
                if(respondidas === preguntas.length) mostrarResultado();
            };
            card.appendChild(btn);
        });

        const f = document.createElement('div');
        f.id = 'f' + i;
        f.className = 'feedback';
        card.appendChild(f);
        quizContainer.appendChild(card);
    });

    function mostrarResultado() {
        const resDiv = document.getElementById('resultado-final');
        const circulo = document.getElementById('circulo');
        const msg = document.getElementById('mensaje-final');
        
        resDiv.style.display = 'block';
        circulo.innerText = `${aciertos}/10`;
        
        if(aciertos >= 5) {
            circulo.className = 'circle-wrap pass';
            msg.innerHTML = "¡SISTEMA PROTEGIDO!<br>Eres un maestro del firewall.";
            msg.style.color = "#81c784";
        } else {
            circulo.className = 'circle-wrap fail';
            msg.innerHTML = "¡SISTEMA HACKEADO!<br>Repasa tus reglas.";
            msg.style.color = "#e57373";
        }
        resDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
